---
layout: default
---
<article class="post">
  <header class="post-header">
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y年%m月%d日" }}</time>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}<p class="post-desc">{{ page.description }}</p>{% endif %}
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <nav class="post-back"><a href="{{ '/' | relative_url }}">← 記事一覧へ戻る</a></nav>
</article>
