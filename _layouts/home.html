---
layout: default
---
<section class="hero">
  <p class="hero-eyebrow">HACH BLOG</p>
  <h1 class="hero-title">業務効率化とAI活用の<span class="accent">実践知</span></h1>
  <p class="hero-lead">{{ content }}</p>
</section>

<section class="post-list">
  {% for post in site.posts %}
  <a class="post-card" href="{{ post.url | relative_url }}">
    <time class="post-card-date" datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y.%m.%d" }}</time>
    <h2 class="post-card-title">{{ post.title }}</h2>
    <p class="post-card-desc">{{ post.description | default: post.excerpt | strip_html | truncate: 90 }}</p>
    <span class="post-card-more">読む →</span>
  </a>
  {% endfor %}
</section>
